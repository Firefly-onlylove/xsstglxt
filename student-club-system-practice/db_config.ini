; =============================================================
; db_config.ini — 数据库连接配置
; 学生社团管理系统 SCMS
;
; ⚠ 首次部署必改：把 host 改成 MySQL 服务器的实际 IP，
;   把 user / password 改成你创建的账号（见 sql/01_create_database.sql）。
; =============================================================

[database]
; MySQL 服务器地址：本机部署填 127.0.0.1；
; 局域网集中部署填服务器的内网 IP，例如 192.168.1.100
host = 127.0.0.1
port = 3306

; 数据库账号。sql/01_create_database.sql 里创建的是 scms_user / scms_pass_2026。
; 若图省事直接用 root，把下面两行改成你的 root 账号密码即可。
user = scms_user
password = scms_pass_2026

; 数据库名（建库脚本固定为 scms_db，一般不用改）
database = scms_db

; 连接池大小：并发请求多可调大，一般 5 足够
pool_size = 5

[server]
; 发票图片、导出文件、备份文件的存放目录（相对 scms 可执行文件）
receipt_dir = storage/receipts
export_dir  = storage/exports
backup_dir  = storage/backups

[app]
; 自动备份时刻（0-23 点），预留配置，当前版本未强制启用
auto_backup_hour = 3
; 会话超时秒数，0 表示不超时
session_timeout = 0
